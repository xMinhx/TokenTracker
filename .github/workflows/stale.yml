name: Stale

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: stale
          exempt-issue-labels: "pinned,security,roadmap"
          stale-issue-message: >
            This issue has been inactive for 30 days and is now marked as stale.
            It will be closed in 7 days if there is no further activity — just
            comment to keep it open.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          exempt-pr-labels: "pinned,work-in-progress"
          stale-pr-message: >
            This PR has been inactive for 14 days and is now marked as stale.
            It will be closed in 7 days if there are no updates.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen when you pick it back up.
