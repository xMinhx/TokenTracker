name: TokenTrackerBar
options:
  bundleIdPrefix: com.tokentracker
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

targets:
  TokenTrackerBar:
    type: application
    platform: macOS
    sources:
      - path: TokenTrackerBar
        excludes:
          - "EmbeddedServer/**"
          - "AppIcon.icon"
      - path: Shared
    dependencies:
      - target: TokenTrackerWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokentracker.bar
        PRODUCT_NAME: TokenTrackerBar
        INFOPLIST_VALUES: |
          LSUIElement = YES
        MARKETING_VERSION: "0.5.66"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        COPY_PHASE_STRIP: NO
        STRIP_INSTALLED_PRODUCT: NO
    info:
      path: TokenTrackerBar/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: TokenTracker
        CFBundleName: TokenTrackerBar
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLName: com.tokentracker.bar.auth
            CFBundleURLSchemes:
              - tokentracker
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    postBuildScripts:
      - script: |
          SRC_DIR="${SRCROOT}/EmbeddedServer"
          DST_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/EmbeddedServer"
          if [ -d "$SRC_DIR" ]; then
            rm -rf "$DST_DIR"
            cp -a "$SRC_DIR" "$DST_DIR"
            chmod +x "$DST_DIR/node"
          fi
          exit 0
        name: "Copy EmbeddedServer to app bundle"
    entitlements:
      path: TokenTrackerBar/TokenTrackerBar.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.tokentracker.bar

  TokenTrackerWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: TokenTrackerWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokentracker.bar.widget
        PRODUCT_NAME: TokenTrackerWidget
        MARKETING_VERSION: "0.5.66"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: YES
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
    info:
      path: TokenTrackerWidget/Info.plist
      properties:
        CFBundleDisplayName: TokenTracker Widgets
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TokenTrackerWidget/TokenTrackerWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.tokentracker.bar
